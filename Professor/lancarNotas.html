                    <div class="table">

                            </div>

                                <button class="save-btn">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M12 3v12"></path>
                                        <path d="M7 10l5 5 5-5"></path>
                                        <path d="M5 21h14"></path>
                                    </svg>
                                </button>
                            </div>

                            <span class="nota-final">8.5</span>
                        </div>

                        <div class="table-row alt">
                            <span class="aluno">Maria Grilo</span>

                            <div class="nota-box">
                                <input type="number" value="10">
                                <button class="save-btn">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M12 3v12"></path>
                                        <path d="M7 10l5 5 5-5"></path>
                                        <path d="M5 21h14"></path>
                                    </svg>
                                </button>
                            </div>

                            <div class="nota-box">
                                <input type="number" value="8.0">
                                <button class="save-btn">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M12 3v12"></path>
                                        <path d="M7 10l5 5 5-5"></path>
                                        <path d="M5 21h14"></path>
                                    </svg>
                                </button>
                            </div>

                            <span class="nota-final">9.0</span>
                        </div>

                        <div class="table-row">
                            <span class="aluno">João Silva</span>

                            <div class="nota-box">
                                <input type="number" value="7.0">
                                <button class="save-btn">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M12 3v12"></path>
                                        <path d="M7 10l5 5 5-5"></path>
                                        <path d="M5 21h14"></path>
                                    </svg>
                                </button>
                            </div>

                            <div class="nota-box">
                                <input type="number" value="8.0">
                                <button class="save-btn">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M12 3v12"></path>

                                    </svg>

                        </div>

                        <div class="table-row alt">
                            <span class="aluno">Lucas Ramos</span>

                            <div class="nota-box">
                                <input type="number" value="6.5">
                                <button class="save-btn">
                                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M12 3v12"></path>
                                        <path d="M7 10l5 5 5-5"></path>
                                        <path d="M5 21h14"></path>
                                    </svg>

                            <div class="nota-box">

                    </div>

                </div>

            </div>

            <div id="overlay" class="overlay">
                <div class="popup">
                    <h3>Selecione a disciplina:</h3>
                    <button class="disciplinaBtn">Geografia</button>
                    <button class="disciplinaBtn">História</button>
                    <button class="disciplinaBtn">Filosofia</button>
                </div>
            </div>

            <script>
                const abrirPopup = document.getElementById("abrirPopup");
                const overlay = document.getElementById("overlay");
                const botoes = document.querySelectorAll(".disciplinaBtn");
                const disciplinaAtual = document.getElementById("disciplinaAtual");

                // abrir pop up
                abrirPopup.addEventListener("click", function (e) {
                    e.preventDefault(); // impede o link de subir a página
                    overlay.classList.add("active");
                });

                // selecionar disciplina
                botoes.forEach(function (botao) {
                    botao.addEventListener("click", function () {

                        // pega o nome da disciplina clicada
                        const nomeDisciplina = this.textContent;

                        // atualiza na tela
                        disciplinaAtual.textContent = nomeDisciplina;

                        // fecha o popup
                        overlay.classList.remove("active");
                    });
                });

                // fechar clicando fora
                overlay.addEventListener("click", function (e) {
                    if (e.target === overlay) {
                        overlay.classList.remove("active");
                    }
                });
            </script>

        </main>
