<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidya - CRUD</title>
    <link rel="stylesheet" href="addEdit.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <img class="logo-icon" src="./assets/Vydia-logo.jpg"></img>
                <div class="logo-text">
                    <h1>vidya</h1>
                    <p>Plataforma escolar</p>
                </div>
            </div>

            <img class="line" src="./assets/navbar-linha.png" alt="divisor">

            <nav class="nav-menu">
                <a href="./aluno.html" class="nav-item ">
                    <img class="icon" src="./assets/navbar-aluno.png"></img>
                    <span class="text">Alunos</span>
                </a>
                <a href="./professor.html" class="nav-item active">
                    <img class="icon" src="./assets/navbar-prof.png"></img>
                    <span class="text">Professores</span>
                </a>
                <a href="./materia.html" class="nav-item">
                    <img class="icon" src="./assets/navbar-disciplinas.png"></img>
                    <span class="text">Matérias</span>
                </a>
                <a href="./turma.html" class="nav-item ">
                    <img class="icon" src="./assets/navbar-turma.png"></img>
                    <span class="text">Turmas</span>
                </a>
                <a href="./observacoes.html" class="nav-item ">
                    <img class="icon" src="./assets/navbar-observacoes.png"></img>
                    <span class="text">Observações</span>
                </a>
                <a href="./responsaveis.html" class="nav-item">
                    <img class="icon" src="./assets/navbar-responsaveis.png"></img>
                    <span class="text">Responsáveis</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="/Inicio/index.html" class="nav-item logout">
                    <img class="icon" src="./assets/navbar-exit.png"></img>
                    <span class="text">Sair da conta</span>
                </a>
            </div>

        </aside>

        <main class="main-content">

            <h1>Professores</h1>
            <h4>Editar professor</h4>

            <div class="form-add">
                <div class="form-card">

                    <form class="student-form">

                        <div class="form-row">
                            <div class="form-group">
                                <label for="nome-completo">Nome completo</label>
                                <input type="text" id="nomeCompleto" name="nomeCompleto" value="Maria de Andrade" required>
                            </div>
                            <div class="form-group">
                                    <label for="datanascimento">Data de nascimento</label>
                                    <input type="date" id="datanascimento" name="datanascimento" value="1995-09-07" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="telefone">Telefone (com DDD)</label>
                                <input type="text" id="telefone" name="telefone" value="(11) 98888-9897" required>
                            </div>
                            <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="mail" id="email" name="email" value="usuario@gmail.com" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="senha">Senha</label>
                                <input type="password" id="senha" name="senha" value="********" required>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <span>Editar</span>
                            </button>
                            <a href="./professor.html" class="btn btn-secundary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
