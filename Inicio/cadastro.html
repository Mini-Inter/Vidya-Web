<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Vidya - cadastro</title>
</head>
<body>
    <div class="background">

        <div class="bolhas">
            <img src="/imgs/bolha1.png" class="bolha bolha1">
            <img src="/imgs/bolha2.png" class="bolha bolha2">
            <img src="/imgs/bolha3.png" class="bolha bolha3">
            <img src="/imgs/bolha4.png" class="bolha bolha4">
        </div>

        <div class="card">

            <div class="logo">
                <img src="imgs/logoNav.png" alt="vidya logo">
            </div>

            <h1>Comece agora!</h1>
            <p class="subtitulo">
                Por favor, insira suas credenciais
            </p>

            <form>

                <div class="inputt">
                    <label>Nome completo</label>
                    <input type="text">
                </div>

                <div class="inputt">
                    <label>Data de nascimento</label>
                    <input type="date">
                </div>

                <div class="inputt">
                    <label>Email</label>
                    <input type="email">
                </div>

                <div class="inputt">
                    <label>Crie sua senha</label>
                    <input type="password">
                </div>

                <div class="inputt">
                    <label>Confirme sua senha</label>
                    <input type="password">
                </div>

                <button type="submit">Cadastrar</button>

            </form>

        </div>

    </div>
</body>
</html>
