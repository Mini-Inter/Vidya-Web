<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Vidya</title>
</head>
<body>
    <section class="landing">
        <div class="logo">
            <img src="imgs/logoNav.png" alt="logo">
        </div>

        <div class="texto">
            <h1>Bem-vindo ao Vidya!<br>
            Aprenda, acompanhe, evolua, tudo em um só lugar.</h1>
            <button>
                Acesse agora <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div class="imagem">
            <img src="imgs/img landing.png" alt="imagem da landing">
        </div>
    </section>
</body>
</html>
