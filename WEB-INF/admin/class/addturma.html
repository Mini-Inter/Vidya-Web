<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidya - CRUD</title>
    <link rel="stylesheet" href="../css/addEdit.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <img class="logo-icon" src="../assets/Vydia-logo.jpg"></img>
                <div class="logo-text">
                    <h1>vidya</h1>
                    <p>Plataforma escolar</p>
                </div>
            </div>

            <img class="line" src="../assets/navbar-linha.png" alt="divisor">

            <nav class="nav-menu">
                <a href="../student/students.jsp" class="nav-item ">
                    <img class="icon" src="../assets/navbar-aluno.png"></img>
                    <span class="text">Alunos</span>
                </a>
                <a href="../teacher/teachers.jsp" class="nav-item">
                    <img class="icon" src="../assets/navbar-prof.png"></img>
                    <span class="text">Professores</span>
                </a>
                <a href="../subject/subjects.jsp" class="nav-item">
                    <img class="icon" src="../assets/navbar-disciplinas.png"></img>
                    <span class="text">Matérias</span>
                </a>
                <a href="turma.html" class="nav-item active">
                    <img class="icon" src="../assets/navbar-turma.png"></img>
                    <span class="text">Turmas</span>
                </a>
                <a href="../report/observacoes.html" class="nav-item ">
                    <img class="icon" src="../assets/navbar-observacoes.png"></img>
                    <span class="text">Observações</span>
                </a>
                <a href="../guardian/responsaveis.html" class="nav-item ">
                    <img class="icon" src="../assets/navbar-responsaveis.png"></img>
                    <span class="text">Responsáveis</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-item logout">
                    <img class="icon" src="../assets/navbar-exit.png"></img>
                    <span class="text">Sair da conta</span>
                </a>
            </div>

        </aside>

        <main class="main-content">

            <h1>Turma</h1>
            <h4>Adicionar nova turma</h4>

            <div class="form-add">
                <div class="form-card">

                    <form class="student-form">

                        <div class="form-row">
                            <div class="form-group">
                                <label for="serie">Série</label>
                                <input type="text" id="serie" name="serie" placeholder="Ex: 2° Ano" required>
                            </div>
                            <div class="form-group">
                                    <label for="turma">Turma</label>
                                    <input type="text" id="turma" name="turma"  placeholder="Ex: G" required>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <span>Adicionar</span>
                            </button>
                            <a href="turma.html" class="btn btn-secundary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
